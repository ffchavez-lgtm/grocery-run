<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F5C45">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Grocery Run">
<title>Grocery Run</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231F5C45'/%3E%3Cpath d='M28 40h44l-5 30a4 4 0 0 1-4 4H37a4 4 0 0 1-4-4z' fill='none' stroke='%23F7F5EF' stroke-width='5' stroke-linejoin='round'/%3E%3Cpath d='M40 40c0-9 4-15 10-15s10 6 10 15' fill='none' stroke='%23E0922B' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root{
    --paper:#F7F5EF; --surface:#FFFFFF; --ink:#1C2A24; --muted:#6E7B74;
    --pine:#1F5C45; --pine-soft:#E7EEEA; --honey:#C8761F; --honey-soft:#F6EAD8;
    --clay:#B23A2E; --line:#E4E0D5; --line-soft:#EFECE3;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--sans);
    line-height:1.5; font-size:16px;
    padding:0 0 calc(env(safe-area-inset-bottom) + 96px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;}

  /* ---- top bar ---- */
  .top{
    position:sticky;top:0;z-index:20;background:var(--paper);
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .mark{width:30px;height:30px;flex:none;}
  .brand h1{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin:0;}
  .brand p{font-size:12px;color:var(--muted);margin:1px 0 0;letter-spacing:0.01em;}

  .meter-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
  .incart{font-family:var(--mono);font-size:15px;font-weight:600;}
  .incart .of{color:var(--muted);font-weight:400;}
  .budget-btn{
    font-family:var(--mono);font-size:13px;color:var(--pine);background:var(--pine-soft);
    border:none;border-radius:8px;padding:5px 10px;font-weight:600;cursor:pointer;
  }
  .budget-edit{display:flex;align-items:center;gap:6px;}
  .budget-edit input{
    font-family:var(--mono);font-size:14px;width:74px;padding:5px 8px;border:1px solid var(--pine);
    border-radius:8px;background:var(--surface);color:var(--ink);
  }
  .meter{position:relative;height:10px;border-radius:6px;background:var(--line-soft);overflow:hidden;}
  .meter-fill{height:100%;border-radius:6px;background:var(--pine);width:0%;transition:width .25s ease,background .25s ease;}
  .meter-mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.45;}
  .stat-row{display:flex;gap:18px;margin-top:9px;}
  .stat{font-size:11px;color:var(--muted);}
  .stat b{display:block;font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ink);margin-top:1px;}
  .stat b.over{color:var(--clay);}

  /* ---- store ---- */
  .store{margin:18px 14px;background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
  .store-head{padding:14px 16px 12px;border-bottom:1px solid var(--line-soft);}
  .store-title{display:flex;align-items:center;gap:8px;}
  .pin{width:16px;height:16px;flex:none;color:var(--pine);}
  .store-title h2{font-size:16px;font-weight:700;margin:0;letter-spacing:-0.01em;}
  .store-loc{font-size:12px;color:var(--muted);margin:2px 0 0 24px;}
  .store-tip{font-size:11px;color:var(--honey);margin:8px 0 0;line-height:1.45;display:flex;gap:5px;}
  .store-tip svg{flex:none;margin-top:1px;}
  .coupon{
    margin:10px 0 0;display:inline-flex;align-items:center;gap:8px;cursor:pointer;
    background:var(--honey-soft);border-radius:9px;padding:7px 11px;font-size:12px;color:#7a4711;font-weight:600;
  }
  .coupon .sw{width:32px;height:18px;border-radius:10px;background:#d8cdbb;position:relative;transition:background .2s;flex:none;}
  .coupon .sw i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;}
  .coupon.on .sw{background:var(--honey);}
  .coupon.on .sw i{left:16px;}

  /* ---- item ---- */
  .item{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;border-bottom:1px solid var(--line-soft);}
  .item:last-child{border-bottom:none;}
  .check{
    width:22px;height:22px;flex:none;margin-top:1px;border:2px solid #cfd6d1;border-radius:7px;
    background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .check svg{width:14px;height:14px;color:#fff;opacity:0;}
  .item.checked .check{background:var(--pine);border-color:var(--pine);}
  .item.checked .check svg{opacity:1;}
  .body{flex:1;min-width:0;cursor:pointer;}
  .name{font-size:15px;line-height:1.35;}
  .item.checked .name{text-decoration:line-through;color:var(--muted);}
  .star{color:var(--honey);font-size:12px;margin-left:4px;}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .tag{font-size:10px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:1px 7px;}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
  .price{font-family:var(--mono);font-size:14px;font-weight:600;}
  .qty{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .edit-btn{background:none;border:none;color:#b6bdb8;cursor:pointer;padding:2px;}
  .edit-btn svg{width:15px;height:15px;display:block;}

  /* ---- edit / add forms ---- */
  .editor{padding:12px 16px;background:var(--paper);border-bottom:1px solid var(--line-soft);}
  .editor .frow{display:flex;gap:8px;margin-bottom:8px;}
  .editor label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
  .editor input{
    width:100%;font-family:var(--sans);font-size:15px;padding:9px 10px;border:1px solid var(--line);
    border-radius:9px;background:var(--surface);color:var(--ink);
  }
  .editor input.num{font-family:var(--mono);}
  .editor .actions{display:flex;gap:8px;justify-content:space-between;align-items:center;}
  .btn{font-family:var(--sans);font-size:14px;font-weight:600;border-radius:9px;padding:9px 16px;border:none;cursor:pointer;}
  .btn.save{background:var(--pine);color:#fff;}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
  .btn.del{background:transparent;color:var(--clay);border:1px solid #e6c9c5;}
  .add-row{padding:11px 16px;}
  .add-trigger{width:100%;background:transparent;border:1px dashed #cdd4cf;color:var(--pine);font-weight:600;
    font-size:14px;border-radius:10px;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}

  /* ---- footer ---- */
  .foot{display:flex;gap:10px;margin:22px 14px 0;}
  .foot .btn{flex:1;}
  .foot .new{background:var(--honey);color:#fff;}
  .note{font-size:11px;color:var(--muted);text-align:center;margin:16px 24px 0;line-height:1.5;}

  :focus-visible{outline:2px solid var(--pine);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
        <rect width="100" height="100" rx="22" fill="#1F5C45"/>
        <path d="M28 40h44l-5 30a4 4 0 0 1-4 4H37a4 4 0 0 1-4-4z" fill="none" stroke="#F7F5EF" stroke-width="5" stroke-linejoin="round"/>
        <path d="M40 40c0-9 4-15 10-15s10 6 10 15" fill="none" stroke="#E0922B" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>Grocery Run</h1>
        <p>Georgetown + Idaho Springs · weekly</p>
      </div>
    </div>

    <div class="meter-row">
      <span class="incart"><span id="incart">$0.00</span> <span class="of">in cart</span></span>
      <span id="budget-slot"></span>
    </div>
    <div class="meter">
      <div class="meter-fill" id="fill"></div>
      <div class="meter-mark" id="mark" title="full plan"></div>
    </div>
    <div class="stat-row">
      <div class="stat">plan total<b id="plan">$0.00</b></div>
      <div class="stat">budget left<b id="left">$0.00</b></div>
      <div class="stat">items in cart<b id="count">0 / 0</b></div>
    </div>
  </div>

  <div id="stores"></div>

  <div class="foot">
    <button class="btn new" id="newweek">Start new week</button>
    <button class="btn ghost" id="reset">Reset to default list</button>
  </div>
  <p class="note">Saved automatically on this phone. Add it to your home screen from your browser menu for one-tap access. Prices are your estimates — tap any item to adjust.</p>
</div>

<script>
const KEY = 'groceryRun_v1';

const DEFAULT = {
  budget: 75,
  stores: [
    {
      id:'dg', name:'Dollar General', loc:'Georgetown, CO',
      tip:'Shop Saturday for the $5 off $25 store coupon · clip digital coupons in the myDG app first.',
      coupon:{ label:'$5 off $25 (Sat)', threshold:25, amount:5, on:true },
      items:[
        {id:'d1', name:'Eggs (dozen)', price:2.75, qty:1, tags:['B12','Vit D','Selenium']},
        {id:'d2', name:'Rolled oats (18 oz)', price:2.50, qty:1, tags:['B1','Magnesium','Iron']},
        {id:'d3', name:'Peanut butter (16 oz)', price:2.00, qty:1, tags:['B3','Vit E','Protein']},
        {id:'d4', name:'Sardines in oil (2 cans)', price:2.50, qty:1, tags:['Vit D','B12','Omega-3']},
        {id:'d5', name:'Black beans (2 cans)', price:2.00, qty:1, tags:['Folate','Iron']},
        {id:'d6', name:'Whole grain bread', price:2.00, qty:1, tags:['B vitamins','Fiber']},
        {id:'d7', name:'Olive oil (16.9 oz)', price:4.00, qty:1, tags:['Vit E','Healthy fats']},
        {id:'d8', name:'Iodized salt', price:1.00, qty:1, tags:['Iodine']},
        {id:'d9', name:'Ground coffee (12 oz)', price:3.50, qty:1, tags:['Antioxidants']},
        {id:'d10', name:'Green tea (40 ct)', price:2.50, qty:1, tags:['L-theanine']},
        {id:'d11', name:'Sparkling water (12-pk)', price:3.00, qty:1, tags:['Hydration']},
        {id:'d12', name:'Almonds (8 oz)', price:3.00, qty:1, tags:['Vit E','Magnesium']},
        {id:'d13', name:'Dark chocolate 70%+', price:2.50, qty:1, tags:['Magnesium','Flavonoids'], star:true}
      ]
    },
    {
      id:'sw', name:'Safeway', loc:'Idaho Springs, CO',
      tip:'New weekly ad drops Wednesday · clip Safeway for U deals in the app and enter your phone number at checkout.',
      coupon:null,
      items:[
        {id:'s1', name:'Chicken thighs, bone-in (~2.5 lb)', price:5.50, qty:1, tags:['B12','Zinc','B6']},
        {id:'s2', name:'Greek yogurt, plain (32 oz)', price:4.00, qty:1, tags:['Calcium','B12','Iodine']},
        {id:'s3', name:'Baby spinach (5 oz)', price:3.00, qty:1, tags:['Iron','Folate','Vit K']},
        {id:'s4', name:'Sweet potatoes (2–3)', price:2.50, qty:1, tags:['Vit A','Potassium']},
        {id:'s5', name:'Broccoli', price:2.00, qty:1, tags:['Vit C','Vit K']},
        {id:'s6', name:'Bananas (bunch)', price:1.75, qty:1, tags:['Potassium','B6']},
        {id:'s7', name:'Garlic (1 head)', price:0.75, qty:1, tags:['Allicin']},
        {id:'s8', name:'Apples (3 lb bag)', price:3.50, qty:1, tags:['Vit C','Fiber']},
        {id:'s9', name:'Baby carrots (2 lb)', price:2.00, qty:1, tags:['Vit A','Fiber']},
        {id:'s10', name:'Blueberries (1 pint)', price:3.50, qty:1, tags:['Antioxidants','Vit C'], star:true}
      ]
    }
  ]
};

let state, editingId=null, addingStore=null, editingBudget=false;

function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
const money = n => '$'+(Math.round(n*100)/100).toFixed(2);

function storeSub(store, onlyCart){
  let s=0;
  store.items.forEach(it=>{ if(!onlyCart || it.inCart) s += it.price*it.qty; });
  return s;
}
function withCoupon(store, sub){
  if(store.coupon && store.coupon.on && sub >= store.coupon.threshold) return sub - store.coupon.amount;
  return sub;
}
function totals(){
  let plan=0, cart=0, inCount=0, total=0;
  state.stores.forEach(st=>{
    plan += withCoupon(st, storeSub(st,false));
    cart += withCoupon(st, storeSub(st,true));
    st.items.forEach(it=>{ total++; if(it.inCart) inCount++; });
  });
  return {plan, cart, inCount, total};
}

const ICON = {
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>',
  pencil:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  pin:'<svg class="pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
  tag:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0l-7.4-7.4V3h10.2l7.2 7.2a2 2 0 0 1 0 3.2z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/></svg>',
  plus:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>'
};

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  const t = totals();
  document.getElementById('incart').textContent = money(t.cart);
  document.getElementById('plan').textContent = money(t.plan);
  const leftEl = document.getElementById('left');
  const left = state.budget - t.cart;
  leftEl.textContent = money(left);
  leftEl.classList.toggle('over', left < 0);
  document.getElementById('count').textContent = t.inCount + ' / ' + t.total;

  const pct = state.budget>0 ? Math.min(t.cart/state.budget,1)*100 : 0;
  const fill = document.getElementById('fill');
  fill.style.width = pct + '%';
  const ratio = state.budget>0 ? t.cart/state.budget : 0;
  fill.style.background = ratio>1 ? 'var(--clay)' : ratio>0.85 ? 'var(--honey)' : 'var(--pine)';
  const mark = document.getElementById('mark');
  const mp = state.budget>0 ? Math.min(t.plan/state.budget,1)*100 : 0;
  mark.style.left = mp + '%';
  mark.style.display = t.plan>0 ? 'block' : 'none';

  const bslot = document.getElementById('budget-slot');
  if(editingBudget){
    bslot.innerHTML = '<span class="budget-edit"><input id="budget-input" class="num" type="number" inputmode="decimal" min="0" step="1" value="'+state.budget+'"><button class="budget-btn" data-act="save-budget">set</button></span>';
    const bi = document.getElementById('budget-input'); bi.focus(); bi.select();
    bi.addEventListener('keydown', e=>{ if(e.key==='Enter') commitBudget(); });
  } else {
    bslot.innerHTML = '<button class="budget-btn" data-act="edit-budget">budget '+money(state.budget)+'</button>';
  }

  const root = document.getElementById('stores');
  root.innerHTML = state.stores.map(renderStore).join('');
}

function renderStore(st){
  const sub = storeSub(st,false);
  const couponActive = st.coupon && st.coupon.on && sub >= st.coupon.threshold;
  let h = '<div class="store">';
  h += '<div class="store-head">';
  h += '<div class="store-title">'+ICON.pin+'<h2>'+esc(st.name)+'</h2></div>';
  h += '<div class="store-loc">'+esc(st.loc)+'</div>';
  h += '<p class="store-tip">'+ICON.tag.replace('width="12" height="12"','width="13" height="13"')+'<span>'+esc(st.tip)+'</span></p>';
  if(st.coupon){
    h += '<div class="coupon'+(st.coupon.on?' on':'')+'" data-act="toggle-coupon" data-store="'+st.id+'">'
      + '<span class="sw"><i></i></span>'
      + esc(st.coupon.label) + (couponActive?' · −'+money(st.coupon.amount):'')
      + '</div>';
  }
  h += '</div>';

  st.items.forEach(it=>{
    if(editingId===it.id){ h += renderEditor(st, it); return; }
    h += '<div class="item'+(it.inCart?' checked':'')+'">';
    h += '<div class="check" data-act="toggle" data-store="'+st.id+'" data-id="'+it.id+'" role="checkbox" aria-checked="'+(it.inCart?'true':'false')+'" tabindex="0">'+ICON.check+'</div>';
    h += '<div class="body" data-act="toggle" data-store="'+st.id+'" data-id="'+it.id+'">';
    h += '<div class="name">'+esc(it.name)+(it.star?'<span class="star" title="nicer pick">★</span>':'')+'</div>';
    if(it.tags && it.tags.length) h += '<div class="tags">'+it.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>';
    h += '</div>';
    h += '<div class="right">';
    h += '<span class="price">'+money(it.price*it.qty)+'</span>';
    if(it.qty>1) h += '<span class="qty">'+it.qty+' × '+money(it.price)+'</span>';
    h += '<button class="edit-btn" data-act="edit" data-store="'+st.id+'" data-id="'+it.id+'" aria-label="Edit '+esc(it.name)+'">'+ICON.pencil+'</button>';
    h += '</div></div>';
  });

  if(addingStore===st.id){
    h += renderAdd(st);
  } else {
    h += '<div class="add-row"><button class="add-trigger" data-act="add-open" data-store="'+st.id+'">'+ICON.plus+' Add item</button></div>';
  }
  h += '</div>';
  return h;
}

function renderEditor(st, it){
  return '<div class="editor">'
    + '<div><label>Item</label><input id="ed-name" value="'+esc(it.name)+'"></div>'
    + '<div class="frow" style="margin-top:8px;">'
    + '<div style="flex:2;"><label>Price each</label><input id="ed-price" class="num" type="number" inputmode="decimal" min="0" step="0.01" value="'+it.price+'"></div>'
    + '<div style="flex:1;"><label>Qty</label><input id="ed-qty" class="num" type="number" inputmode="numeric" min="1" step="1" value="'+it.qty+'"></div>'
    + '</div>'
    + '<div class="actions">'
    + '<button class="btn del" data-act="delete" data-store="'+st.id+'" data-id="'+it.id+'">Delete</button>'
    + '<div style="display:flex;gap:8px;">'
    + '<button class="btn ghost" data-act="cancel">Cancel</button>'
    + '<button class="btn save" data-act="save-edit" data-store="'+st.id+'" data-id="'+it.id+'">Save</button>'
    + '</div></div></div>';
}

function renderAdd(st){
  return '<div class="editor">'
    + '<div><label>New item</label><input id="add-name" placeholder="e.g. Avocados (2)"></div>'
    + '<div style="margin-top:8px;"><label>Price</label><input id="add-price" class="num" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00"></div>'
    + '<div class="actions" style="margin-top:10px;justify-content:flex-end;gap:8px;">'
    + '<button class="btn ghost" data-act="cancel">Cancel</button>'
    + '<button class="btn save" data-act="add-save" data-store="'+st.id+'">Add</button>'
    + '</div></div>';
}

function findStore(id){ return state.stores.find(s=>s.id===id); }
function findItem(st, id){ return st.items.find(i=>i.id===id); }

function commitBudget(){
  const v = parseFloat(document.getElementById('budget-input').value);
  if(!isNaN(v) && v>=0) state.budget = Math.round(v*100)/100;
  editingBudget=false; save(); render();
}

document.addEventListener('click', e=>{
  const el = e.target.closest('[data-act]');
  if(!el) return;
  const act = el.dataset.act;
  const st = el.dataset.store ? findStore(el.dataset.store) : null;
  const id = el.dataset.id;

  if(act==='toggle'){ const it=findItem(st,id); it.inCart=!it.inCart; save(); render(); }
  else if(act==='edit'){ editingId=id; addingStore=null; render(); }
  else if(act==='cancel'){ editingId=null; addingStore=null; render(); }
  else if(act==='save-edit'){
    const it=findItem(st,id);
    const name=document.getElementById('ed-name').value.trim();
    const price=parseFloat(document.getElementById('ed-price').value);
    const qty=parseInt(document.getElementById('ed-qty').value,10);
    if(name) it.name=name;
    if(!isNaN(price)&&price>=0) it.price=Math.round(price*100)/100;
    if(!isNaN(qty)&&qty>=1) it.qty=qty;
    editingId=null; save(); render();
  }
  else if(act==='delete'){ st.items=st.items.filter(i=>i.id!==id); editingId=null; save(); render(); }
  else if(act==='add-open'){ addingStore=st.id; editingId=null; render(); }
  else if(act==='add-save'){
    const name=document.getElementById('add-name').value.trim();
    const price=parseFloat(document.getElementById('add-price').value);
    if(name){
      st.items.push({id:'x'+Date.now(), name:name, price:(!isNaN(price)&&price>=0)?Math.round(price*100)/100:0, qty:1, tags:[]});
    }
    addingStore=null; save(); render();
  }
  else if(act==='toggle-coupon'){ st.coupon.on=!st.coupon.on; save(); render(); }
  else if(act==='edit-budget'){ editingBudget=true; render(); }
  else if(act==='save-budget'){ commitBudget(); }
});

document.addEventListener('keydown', e=>{
  if(e.key!=='Enter'&&e.key!==' ') return;
  const el=e.target.closest('[data-act="toggle"]');
  if(el){ e.preventDefault(); const st=findStore(el.dataset.store); const it=findItem(st,el.dataset.id); it.inCart=!it.inCart; save(); render(); }
});

document.getElementById('newweek').addEventListener('click', ()=>{
  state.stores.forEach(st=>st.items.forEach(it=>it.inCart=false));
  save(); render();
  window.scrollTo({top:0, behavior:'smooth'});
});
document.getElementById('reset').addEventListener('click', ()=>{
  if(confirm('Reset the whole list back to the default plan? Your edits will be cleared.')){
    state = JSON.parse(JSON.stringify(DEFAULT));
    editingId=null; addingStore=null; save(); render();
  }
});

state = load();
render();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
